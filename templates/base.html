<!DOCTYPE html>
<html>
<head>
    <title>{% block title %}My To-Do App{% endblock %}</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 40px auto;
            padding: 0 20px;
        }
        nav {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid #ccc;
        }
        nav a {
            margin-right: 15px;
            text-decoration: none;
            color: #333;
        }
        .message {
            color: red;
            margin-bottom: 15px;
        }
    </style>
</head>
<body>

    <nav>
        <a href="{{ url_for('task_list') }}">Tasks</a>
        <a href="{{ url_for('index') }}">Home</a>
    </nav>

    <div>
        {% with messages = get_flashed_messages() %}
            {% if messages %}
                {% for message in messages %}
                    <p class="message">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}
    </div>

    {% block content %}{% endblock %}

</body>
</html>
